name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build macOS app
        run: npm run dist:mac

      - name: Compress app
        run: ditto -c -k --sequesterRsrc --keepParent "release/mac-arm64/Sonic Topography.app" "Sonic Topography-mac-arm64.zip"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sonic Topography macOS arm64
          path: Sonic Topography-mac-arm64.zip
